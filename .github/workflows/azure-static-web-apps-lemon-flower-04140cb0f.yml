name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Clean everything
      - name: Clean environment
        run: |
          rm -rf node_modules
          rm -rf package-lock.json
          rm -rf ~/.npm

      # Install dependencies with optional deps
      - name: Install dependencies
        run: npm install --include=optional

      # 🔥 Force install Rollup native binary (CRITICAL FIX)
      - name: Fix Rollup native module
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional

      # Rebuild native modules
      - name: Rebuild native modules
        run: npm rebuild

      # Build app
      - name: Build Application
        run: npm run build

      # Deploy
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"   # Vite
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request Deployment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "close"
