name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    permissions:
      id-token: write
      contents: read

    steps:
      # ✅ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ Use stable Node version (VERY IMPORTANT)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Clean environment
      - name: Clean environment
        run: |
          rm -rf node_modules
          rm -rf ~/.npm

      # ✅ Install dependencies (stable & deterministic)
      - name: Install dependencies
        run: npm ci

      # ✅ Rebuild native modules (fix PostCSS / Rollup issues)
      - name: Rebuild native modules
        run: npm rebuild

      # ✅ Build app
      - name: Build Application
        run: npm run build

      # ✅ Deploy (skip Oryx build completely)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"   # 🔥 use "dist" for Vite (change to "build" if React CRA)
          skip_app_build: true      # 🔥 CRITICAL FIX

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request Deployment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "close"
