name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Use stable Node version (fixes Rollup issue)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Clean install (fix npm optional dependency bug)
      - name: Clean and Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # Build application
      - name: Build Application
        run: npm run build

      # Deploy to Azure Static Web Apps (skip Oryx build)
      - name: Deploy to Azure Static Web App
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "build"   # 👉 change to "dist" if using Vite
          skip_app_build: true       # 🔥 critical fix

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FLOWER_04140CB0F }}
          action: "close"
